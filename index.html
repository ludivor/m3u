<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Service | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dot { height: 8px; width: 8px; background-color: #334155; border-radius: 50%; display: inline-block; }
        /* La pista: el punto cambiará de color al pasar el ratón para recordarte que ahí hay algo... */
        .secret-hint:hover { background-color: #3b82f6; cursor: help; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-200">

    <div class="max-w-md w-full p-8 glass rounded-3xl shadow-2xl text-center">
        <div class="mb-6 inline-flex p-4 rounded-full bg-blue-500/10 text-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" />
            </svg>
        </div>

        <h1 class="text-2xl font-bold mb-2">Service Status</h1>
        <p class="text-slate-400 text-sm mb-8">All systems are operational and running on Cloudflare Edge Network.</p>

        <div class="space-y-4 text-left">
            <div class="flex items-center justify-between p-3 rounded-xl bg-white/5">
                <span class="text-sm font-medium">Gateway Node</span>
                <span class="flex items-center text-xs text-green-400">
                    <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span> Online
                </span>
            </div>
            <div class="flex items-center justify-between p-3 rounded-xl bg-white/5">
                <span class="text-sm font-medium">Uptime</span>
                <span class="text-xs text-slate-400">99.98%</span>
            </div>
        </div>

        <div class="mt-12 pt-6 border-t border-white/5 flex justify-center space-x-2">
            <span class="dot"></span>
            <span class="dot secret-hint" title="Format: /lista.m3u?token=..."></span>
            <span class="dot"></span>
        </div>
        
        <p class="mt-4 text-[10px] text-slate-600 uppercase tracking-widest font-semibold">
            v2.4.0-stable
        </p>
    </div>

</body>
</html>
